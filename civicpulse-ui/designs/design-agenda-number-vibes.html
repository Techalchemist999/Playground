<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CivicPulse — Agenda Number Design Picker</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;padding:24px;}
h1{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#6366f1,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{color:#64748b;font-size:12px;margin-bottom:24px;line-height:1.6;}
.tag{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6366f1;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:1100px;margin:0 auto;}
.sw{background:#fff;border-radius:14px;border:2px solid #e2e8f0;overflow:hidden;cursor:pointer;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.03);}
.sw:hover{border-color:#a5b4fc;box-shadow:0 6px 24px rgba(99,102,241,.12);transform:translateY(-2px);}
.sw.selected{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.sh{padding:10px 16px 8px;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid #f1f5f9;}
.sh h2{font-size:13px;font-weight:700;color:#0f172a;}
.sh p{font-size:9px;color:#94a3b8;margin-left:auto;font-style:italic;}
.preview{padding:10px 14px;background:#fff;}
.row{display:flex;align-items:center;gap:10px;padding:5px 6px;border-radius:5px;}
.row.act{background:#f8fafc;}
.row .txt{font-size:10px;font-weight:600;color:#334155;line-height:1.3;}
.row.act .txt{color:#0f172a;font-weight:700;}
.row.done .txt{color:#94a3b8;text-decoration:line-through;}
.row .desc{font-size:7px;color:#94a3b8;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
#result{display:none;max-width:1100px;margin:20px auto 0;background:#fff;border-radius:14px;border:2px solid #6366f1;padding:16px;text-align:center;}
#result .label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6366f1;}
#result .pick{font-size:18px;font-weight:800;margin-top:4px;}
</style>
</head>
<body>

<div style="max-width:1100px;margin:0 auto;">
  <div class="tag">DESIGN PICKER</div>
  <h1>Agenda Item Numbers — 10 Styles</h1>
  <p class="subtitle">3 discussed, 1 active, 3 pending. Light mode, monochrome base. Each fundamentally different.</p>
</div>

<div class="grid" id="grid"></div>

<div id="result">
  <div class="label">YOUR SELECTION</div>
  <div class="pick" id="pick-text"></div>
</div>

<script>
const ITEMS = [
  {n:'1',t:'Call to Order',s:'done'},
  {n:'2',t:'Adoption of Agenda',s:'done'},
  {n:'3',t:'Adoption of Minutes',s:'done',d:'Feb 10, 2025'},
  {n:'4',t:'Delegation — Pine Ave',s:'act',d:'Drainage concerns'},
  {n:'5',t:'Bylaw 1021 — Third Reading',s:'pend'},
  {n:'6',t:'Water Rate Increase',s:'pend'},
  {n:'7',t:'Road Maintenance Budget',s:'pend'},
];

const designs = [
  // 1: Simple filled circle — current style baseline
  {
    id:'filled-circle', num:'01', name:'Filled Circle',
    desc:'Solid circle, number inside. Done=check, Active=bold. Classic.',
    render: (it) => {
      const bg = it.s==='done'?'#e2e8f0':it.s==='act'?'#0f172a':'#f1f5f9';
      const col = it.s==='done'?'#94a3b8':it.s==='act'?'#fff':'#94a3b8';
      const brd = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#e2e8f0';
      const txt = it.s==='done'?'✓':it.n;
      return `<div style="width:22px;height:22px;border-radius:50%;background:${bg};border:1.5px solid ${brd};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${col};flex-shrink:0;">${txt}</div>`;
    }
  },
  // 2: Underline number — no shape, just the number with a line beneath
  {
    id:'underline', num:'02', name:'Underline',
    desc:'No shape. Just a bold number with a bar underneath. Ultra-minimal.',
    render: (it) => {
      const col = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#94a3b8';
      const bar = it.s==='done'?'#e2e8f0':it.s==='act'?'#0f172a':'#f1f5f9';
      const w = it.s==='act'?'2px':'1px';
      return `<div style="display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0;">
        <span style="font-size:12px;font-weight:800;color:${col};font-variant-numeric:tabular-nums;">${it.s==='done'?'✓':it.n}</span>
        <div style="width:14px;height:${w};background:${bar};border-radius:1px;margin-top:1px;"></div>
      </div>`;
    }
  },
  // 3: Square bracket — [ 4 ]
  {
    id:'bracket', num:'03', name:'Square Bracket',
    desc:'Number framed in [ brackets ]. Code editor feel, typographic.',
    render: (it) => {
      const col = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#94a3b8';
      const txt = it.s==='done'?'✓':it.n;
      return `<div style="font-size:10px;font-weight:600;color:${col};flex-shrink:0;font-family:'Courier New',monospace;white-space:nowrap;letter-spacing:-0.5px;${it.s==='act'?'font-weight:800;':''}"><span style="color:${it.s==='act'?'#cbd5e1':'#e2e8f0'};">[</span>${txt}<span style="color:${it.s==='act'?'#cbd5e1':'#e2e8f0'};">]</span></div>`;
    }
  },
  // 4: Left bar accent — thick vertical bar, number right of it
  {
    id:'bar-accent', num:'04', name:'Bar Accent',
    desc:'Thick vertical bar on the left, number beside it. Kanban-style.',
    render: (it) => {
      const barCol = it.s==='done'?'#e2e8f0':it.s==='act'?'#0f172a':'#f1f5f9';
      const col = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#94a3b8';
      const h = it.s==='act'?'20px':'14px';
      return `<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
        <div style="width:3px;height:${h};background:${barCol};border-radius:2px;"></div>
        <span style="font-size:11px;font-weight:${it.s==='act'?'800':'600'};color:${col};">${it.s==='done'?'✓':it.n}</span>
      </div>`;
    }
  },
  // 5: Dot + number — small dot preceding the number
  {
    id:'dot-number', num:'05', name:'Dot Prefix',
    desc:'Small status dot before the number. Active dot pulses. Clean, data-table.',
    render: (it) => {
      const dotCol = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#e2e8f0';
      const col = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#94a3b8';
      const anim = it.s==='act'?'animation:pulse 1.5s infinite;':'';
      return `<div style="display:flex;align-items:center;gap:5px;flex-shrink:0;">
        <div style="width:6px;height:6px;border-radius:50%;background:${dotCol};${anim}"></div>
        <span style="font-size:10px;font-weight:${it.s==='act'?'800':'600'};color:${col};">${it.s==='done'?'—':it.n}</span>
      </div>`;
    }
  },
  // 6: Tag chip — like a git label
  {
    id:'tag-chip', num:'06', name:'Tag Chip',
    desc:'Rounded tag with # prefix. Active is inverted. GitHub issue style.',
    render: (it) => {
      const isDone = it.s==='done', isAct = it.s==='act';
      const bg = isDone?'#f8fafc':isAct?'#0f172a':'#f1f5f9';
      const col = isDone?'#94a3b8':isAct?'#fff':'#64748b';
      const brd = isDone?'#e2e8f0':isAct?'#0f172a':'#e2e8f0';
      return `<div style="padding:2px 7px;border-radius:4px;background:${bg};border:1px solid ${brd};font-size:8px;font-weight:700;color:${col};flex-shrink:0;font-family:'Courier New',monospace;">${isDone?'✓':'#'+it.n}</div>`;
    }
  },
  // 7: Stepped progress — filled/empty step indicators
  {
    id:'step', num:'07', name:'Step Indicator',
    desc:'Horizontal step dots with connector line. Active is large. Timeline feel.',
    render: (it) => {
      const isDone = it.s==='done', isAct = it.s==='act';
      const sz = isAct?'20px':'12px';
      const bg = isDone?'#cbd5e1':isAct?'#0f172a':'#e2e8f0';
      const col = isAct?'#fff':'transparent';
      return `<div style="display:flex;align-items:center;gap:0;flex-shrink:0;">
        <div style="width:${sz};height:${sz};border-radius:50%;background:${bg};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${col};transition:all .2s;">${isAct?it.n:''}</div>
        <div style="width:6px;height:1.5px;background:${isDone?'#cbd5e1':'#e2e8f0'};"></div>
      </div>`;
    }
  },
  // 8: Outlined square — rounded square, just border, no fill
  {
    id:'outlined-sq', num:'08', name:'Outlined Square',
    desc:'Rounded square outline. Active gets double border. Architectural, clean.',
    render: (it) => {
      const isDone = it.s==='done', isAct = it.s==='act';
      const brd = isDone?'#e2e8f0':isAct?'#0f172a':'#e2e8f0';
      const col = isDone?'#cbd5e1':isAct?'#0f172a':'#94a3b8';
      const shadow = isAct?'box-shadow:0 0 0 3px #e2e8f0;':'';
      return `<div style="width:22px;height:22px;border-radius:5px;border:${isAct?'2':'1.5'}px solid ${brd};display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:${col};flex-shrink:0;${shadow}">${isDone?'✓':it.n}</div>`;
    }
  },
  // 9: Large leading number — oversized number, no container
  {
    id:'large-num', num:'09', name:'Large Leading',
    desc:'Big bold number, no container. Active is extra large. Editorial, magazine.',
    render: (it) => {
      const isDone = it.s==='done', isAct = it.s==='act';
      const sz = isAct?'22px':isDone?'14px':'16px';
      const col = isDone?'#e2e8f0':isAct?'#0f172a':'#cbd5e1';
      const w = isAct?'800':isDone?'600':'700';
      return `<div style="min-width:26px;flex-shrink:0;text-align:right;padding-right:4px;">
        <span style="font-size:${sz};font-weight:${w};color:${col};letter-spacing:-1px;font-variant-numeric:tabular-nums;">${isDone?'✓':it.n}</span>
      </div>`;
    }
  },
  // 10: Progress arc ring
  {
    id:'arc-ring', num:'10', name:'Progress Arc',
    desc:'SVG ring fills as item progresses. Done=full, Active=half, Pending=empty. Apple Watch.',
    render: (it) => {
      const r = 9, c = 2*Math.PI*r;
      const pct = it.s==='done'?1:it.s==='act'?0.6:0;
      const stroke = it.s==='done'?'#cbd5e1':it.s==='act'?'#0f172a':'#f1f5f9';
      const track = '#f1f5f9';
      const col = it.s==='done'?'#94a3b8':it.s==='act'?'#0f172a':'#94a3b8';
      return `<div style="width:24px;height:24px;position:relative;flex-shrink:0;">
        <svg width="24" height="24" viewBox="0 0 24 24" style="transform:rotate(-90deg);position:absolute;top:0;left:0;">
          <circle cx="12" cy="12" r="${r}" fill="none" stroke="${track}" stroke-width="2.5"/>
          <circle cx="12" cy="12" r="${r}" fill="none" stroke="${stroke}" stroke-width="2.5"
            stroke-dasharray="${c*pct} ${c}" stroke-linecap="round"/>
        </svg>
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;color:${col};">${it.s==='done'?'✓':it.n}</div>
      </div>`;
    }
  },
];

document.getElementById('grid').innerHTML = designs.map(d => {
  const rows = ITEMS.map(it => {
    const cls = it.s==='act'?'act':it.s==='done'?'done':'';
    return `<div class="row ${cls}">${d.render(it)}<div><div class="txt">${it.t}</div>${it.d?`<div class="desc">${it.d}</div>`:''}</div></div>`;
  }).join('');
  return `<div class="sw" onclick="select(this,'${d.id}')">
    <div class="sh"><span class="tag">${d.num}</span><h2>${d.name}</h2><p>${d.desc}</p></div>
    <div class="preview">${rows}</div>
  </div>`;
}).join('');

const nm={};designs.forEach(d=>nm[d.id]=`${d.num} — ${d.name}`);
function select(el,id){document.querySelectorAll('.sw').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');document.getElementById('result').style.display='block';document.getElementById('pick-text').textContent=nm[id];}
</script>
</body>
</html>
