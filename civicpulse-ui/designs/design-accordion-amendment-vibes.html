<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CivicPulse — Accordion Amendment Options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',system-ui,sans-serif;background:#f1f5f9;color:#0f172a;padding:24px;}
h1{font-size:22px;font-weight:800;margin-bottom:4px;background:linear-gradient(135deg,#6366f1,#4f46e5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.subtitle{color:#64748b;font-size:12px;margin-bottom:28px;line-height:1.6;}
.tag{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6366f1;}
.options{display:flex;flex-direction:column;gap:28px;max-width:480px;margin:0 auto;}
.sw{background:#fff;border-radius:14px;border:2px solid #e2e8f0;overflow:hidden;cursor:pointer;transition:all .3s;box-shadow:0 2px 10px rgba(0,0,0,.03);}
.sw:hover{border-color:#a5b4fc;box-shadow:0 6px 24px rgba(99,102,241,.12);transform:translateY(-2px);}
.sw.selected{border-color:#6366f1;box-shadow:0 0 0 3px rgba(99,102,241,.15);}
.sh{padding:10px 16px 8px;display:flex;align-items:baseline;gap:8px;border-bottom:1px solid #f1f5f9;}
.sh h2{font-size:14px;font-weight:700;color:#0f172a;}
.sh p{font-size:10px;color:#94a3b8;margin-left:auto;font-style:italic;}
.preview{padding:14px;background:#f8fafc;}
.section-label{text-align:center;font-size:8px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#94a3b8;margin:16px 0 8px;}
.section-label:first-child{margin-top:0;}

/* Card base */
.card{border-radius:12px;overflow:hidden;background:#fff;border:1px solid #e2e8f0;box-shadow:0 2px 10px rgba(0,0,0,.03);}
.bar{height:3px;background:linear-gradient(90deg,#cbd5e1,transparent);}
.hdr{padding:10px 12px 0;}
.meta{font-size:7px;font-weight:700;letter-spacing:1.3px;text-transform:uppercase;color:#94a3b8;margin-bottom:3px;display:flex;align-items:center;gap:4px;}
.tr{margin-bottom:8px;}
.ttl{font-size:13px;font-weight:700;color:#0f172a;line-height:1.3;}
.qt{background:#f8fafc;border-left:3px solid #cbd5e1;border-radius:0 8px 8px 0;padding:8px 11px;margin:0 12px 8px;font-size:11.5px;color:#334155;line-height:1.75;}
.tiles{display:flex;gap:4px;padding:0 12px 8px;}
.tile{flex:1;background:#f1f5f9;border:1.5px solid #cbd5e1;border-radius:6px;padding:4px 7px;}
.tile-l{font-size:6px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:#64748b;margin-bottom:1px;}
.tile-n{font-size:10.5px;font-weight:700;color:#0f172a;}
.votes{display:flex;gap:5px;justify-content:center;padding:6px 12px 8px;}
.vc{text-align:center;}
.orb{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;position:relative;}
.orb::before{content:'';position:absolute;top:2px;left:5px;width:10px;height:4px;border-radius:50%;background:rgba(255,255,255,.5);}
.orb.y{background:linear-gradient(135deg,#dcfce7,#bbf7d0aa);border:1.5px solid #86efac;color:#16a34a;}
.orb.n{background:linear-gradient(135deg,#fee2e2,#fecacaaa);border:1.5px solid #fca5a5;color:#dc2626;}
.orb.w{background:#f1f5f9;border:1.5px dashed #cbd5e1;color:#94a3b8;font-size:9px;}
.on{font-size:5px;color:#94a3b8;margin-top:1px;}
.stripe{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:.5px;text-align:center;}
.stripe.g{background:#f0fdf4;color:#22c55e;border-top:1px solid #dcfce7;}
.stripe.r{background:#fef2f2;color:#dc2626;border-top:1px solid #fee2e2;}
.stripe.wait{background:#f8fafc;color:#94a3b8;border-top:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;gap:5px;}
.stripe.wait .dot{width:4px;height:4px;border-radius:50%;background:#94a3b8;animation:pulse 1.5s infinite;}
.stripe.paused{background:#f8fafc;color:#94a3b8;border-top:1px solid #e2e8f0;font-style:italic;font-weight:600;letter-spacing:0;}
.proc-badge{font-size:7px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:2px 6px;border-radius:999px;color:#64748b;background:#f1f5f9;border:1px solid #cbd5e1;}

/* Small amend votes */
.sm-votes{display:flex;gap:3px;justify-content:center;padding:2px 0;}
.sm-orb{width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;}
.sm-orb.y{background:linear-gradient(135deg,#dcfce7,#bbf7d0aa);border:1px solid #86efac;color:#16a34a;}
.sm-orb.n{background:linear-gradient(135deg,#fee2e2,#fecacaaa);border:1px solid #fca5a5;color:#dc2626;}

@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

#result{display:none;max-width:480px;margin:20px auto 0;background:#fff;border-radius:14px;border:2px solid #6366f1;padding:16px;text-align:center;}
#result .label{font-size:11px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:#6366f1;}
#result .pick{font-size:18px;font-weight:800;margin-top:4px;}
</style>
</head>
<body>

const designs = [

  // 5: Two-tone card — bottom half is the amendment zone

    desc:'Card has two zones — white top for the motion, tinted bottom for amendment',

              <div style="text-align:center"><div class="sm-orb y">✓</div><div style="font-size:4px;color:#94a3b8;">Woodill</div></div>
            </div>
          </div>
        </div>
      </div>

      <div class="section-label">Defeated — Drawer Open</div>
      <div style="border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;box-shadow:0 2px 10px rgba(0,0,0,.03);">
        <div style="background:#fff;">
          <div class="bar"></div><div class="hdr"><div class="meta">Motion · Item 6</div><div class="tr"><div class="ttl">Water Rate Increase — 4.5%</div></div></div>
          <div class="qt">THAT Council approves a 4.5% water rate increase.</div>
          <div class="tiles"><div class="tile"><div class="tile-l">Moved By</div><div class="tile-n">Mayor Veach</div></div><div class="tile"><div class="tile-l">Seconded By</div><div class="tile-n">Cllr Rabel</div></div></div>
          ${mainVotes}<div class="stripe g">CARRIED 4-1</div>
        </div>
        <div style="background:#fefafa;border-top:2px solid #dc2626;">
          <div style="padding:10px 14px;">
            <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px;">
              <svg width="10" height="10" fill="none" stroke="#dc2626" stroke-width="2.5" viewBox="0 0 24 24"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              <span style="font-size:9px;font-weight:700;color:#dc2626;">Amendment Defeated 2-3</span>
            </div>
            <div style="font-size:11px;color:#94a3b8;line-height:1.7;margin-bottom:8px;padding-left:16px;border-left:2px solid #fee2e2;text-decoration:line-through;">"...reducing the increase from 4.5% to 3.0%."</div>
            <div style="display:flex;gap:4px;margin-bottom:6px;">
              <div style="flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:3px 6px;"><div style="font-size:5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#64748b;">Moved By</div><div style="font-size:9px;font-weight:700;color:#0f172a;">Cllr Johnston</div></div>
              <div style="flex:1;background:#fff;border:1px solid #e2e8f0;border-radius:5px;padding:3px 6px;"><div style="font-size:5px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:#64748b;">Seconded By</div><div style="font-size:9px;font-weight:700;color:#0f172a;">Cllr Woodill</div></div>
            </div>
            <div style="display:flex;gap:4px;justify-content:center;">
              <div style="text-align:center"><div class="sm-orb n">✗</div><div style="font-size:4px;color:#94a3b8;">Veach</div></div>
              <div style="text-align:center"><div class="sm-orb n">✗</div><div style="font-size:4px;color:#94a3b8;">Rabel</div></div>
              <div style="text-align:center"><div class="sm-orb y">✓</div><div style="font-size:4px;color:#94a3b8;">Wall</div></div>
              <div style="text-align:center"><div class="sm-orb y">✓</div><div style="font-size:4px;color:#94a3b8;">Johnston</div></div>
              <div style="text-align:center"><div class="sm-orb n">✗</div><div style="font-size:4px;color:#94a3b8;">Woodill</div></div>
            </div>
          </div>
        </div>
      </div>
    `
  },
];

document.querySelector('.options').innerHTML = designs.map(d =>
  `<div class="sw" onclick="select(this,'${d.id}')">
    <div class="sh"><span class="tag">${d.num}</span><h2>${d.name}</h2><p>${d.desc}</p></div>
    <div class="preview">${d.html}</div>
  </div>`
).join('');

const nm={};designs.forEach(d=>nm[d.id]=`${d.num} — ${d.name}`);
function select(el,id){document.querySelectorAll('.sw').forEach(c=>c.classList.remove('selected'));el.classList.add('selected');document.getElementById('result').style.display='block';document.getElementById('pick-text').textContent=nm[id];}
</script>

</div>

<div id="result">
  <div class="label">YOUR SELECTION</div>
  <div class="pick" id="pick-text"></div>
</div>
</body>
</html>
