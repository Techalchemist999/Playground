<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivicPulse — 15 Design Picks</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=DM+Sans:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#0e0e14;padding:28px 32px;color:#fff}
h1{text-align:center;font-size:24px;font-weight:800;margin-bottom:4px}
.sub{text-align:center;font-size:12px;color:rgba(255,255,255,.4);margin-bottom:10px;line-height:1.7}
.rec{display:inline-block;font-size:8px;font-weight:800;letter-spacing:1px;padding:2px 7px;border-radius:4px;margin-left:6px;vertical-align:middle}
.rec.top{background:#22c55e;color:#fff}
.rec.strong{background:#3b82f6;color:#fff}
.rec.fun{background:#a855f7;color:#fff}

.block{margin-bottom:52px}
.label{font-size:11px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.25);margin-bottom:4px;padding-left:2px}
.label b{color:rgba(255,255,255,.6);font-size:13px;letter-spacing:0;text-transform:none;margin-left:6px;font-weight:700}
.why{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:14px;padding-left:2px;line-height:1.6;max-width:800px}

.scene{border-radius:20px;padding:22px;overflow:hidden}
.tri{display:grid;grid-template-columns:1.15fr .95fr .9fr;gap:16px}
.col-lbl{font-size:7px;font-weight:700;letter-spacing:1.6px;text-transform:uppercase;text-align:center;margin-bottom:5px;opacity:.4}

/* Shared panel skeleton */
.p{border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
.ph{padding:11px 14px 9px;display:flex;align-items:center;justify-content:space-between}
.ph h3{font-size:10px;font-weight:800;letter-spacing:1.6px;text-transform:uppercase}
.cnt{font-size:9px;font-weight:600}.cnt b{font-weight:800}
.bar{height:3px;margin:0 14px;border-radius:2px;overflow:hidden}
.bar-fill{height:100%;width:38%;border-radius:2px}
.row{display:flex;gap:9px;padding:6px 14px;align-items:flex-start}
.mk{width:17px;height:17px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:800;flex-shrink:0}
.tt{font-size:10.5px;font-weight:600;line-height:1.35}
.ts{font-size:8px;margin-top:1px}

/* Rules */
.bd{padding:7px 11px;flex:1}
.cb{display:flex;align-items:center;gap:5px;padding:5px 9px;border-radius:7px;margin-bottom:4px}
.cb span{font-size:10px;font-weight:700}.cc{font-size:8px;margin-left:auto}
.cps{padding:3px 0 7px 9px}
.cp{display:inline-block;padding:4px 10px;border-radius:999px;font-size:9.5px;font-weight:600;margin:2px}
.trow{display:flex;justify-content:center;padding:7px 10px 0}
.tg{display:flex;border-radius:7px;padding:2px}
.t{padding:3px 8px;border:none;border-radius:5px;font-size:9px;font-weight:600;cursor:pointer;background:transparent}

/* Setup card */
.sc{display:flex;flex-direction:column}
.sh{padding:16px 18px 12px;border-radius:12px 12px 0 0}
.slogo{display:flex;align-items:center;gap:5px;margin-bottom:8px}
.sico{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center}
.slogo span{font-size:8px;font-weight:800;letter-spacing:1.2px;text-transform:uppercase}
.stitle{font-size:16px;font-weight:800;letter-spacing:-.3px;margin-bottom:3px}
.sdesc{font-size:10.5px;line-height:1.6}
.sbody{padding:14px 18px 16px;flex:1}
.slbl{font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;margin-bottom:7px}
.sdiv{height:1px;margin:10px 0}
.apk{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:9px;margin-bottom:5px}
.apki{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px}
.apkt{font-size:11.5px;font-weight:700}
.apkm{font-size:9.5px;margin-top:1px}
.btn{width:100%;padding:10px;border-radius:9px;border:none;font-size:12px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px}
.btnr{display:flex;gap:7px;margin-top:7px}
.btnr .btn{flex:1;font-size:11px}
</style>
</head>
<body>

<h1>CivicPulse — 15 Design Picks</h1>
<p class="sub">
  Curated for readability during fast council sessions, professional civic settings, and 2-3 hour comfort.<br>
  Each theme applied to: <b>Agenda Creator</b> | <b>Live Sidebar</b> | <b>Rules Panel</b>
</p>
<p style="text-align:center;margin-bottom:40px">
  <span class="rec top">TOP PICK</span> = Designer's recommendation
  <span class="rec strong">STRONG</span> = Excellent readability
  <span class="rec fun">BOLD</span> = Statement piece
</p>

<script>
const D = document;
const W = (h) => D.write(h);

// SVGs
const sun=`<svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>`;
const play=`<svg width="10" height="10" fill="currentColor" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>`;
const doc=`<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16c0 1.1.9 2 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`;
const chk=`<svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`;

function panel(s) {
  // s = style object with all color tokens
  const mkRow = (n,status,title,sub) => {
    const cls = status==='done'?'done':status==='active'?'active':'';
    return `<div class="row" style="${status==='active'?'background:'+s.activeBg:''}">
      <div class="mk" style="border:1.5px solid ${status==='done'?s.mkDone:status==='active'?s.mkActive:s.mkPend};
        background:${status==='active'?s.mkActiveBg:'transparent'};color:${status==='done'?s.mkDone:status==='active'?s.mkActiveC:s.mkPend}">${n}</div>
      <div><div class="tt" style="color:${status==='done'?s.ttDone:status==='active'?s.ttActive:s.ttPend};
        ${status==='done'?'text-decoration:line-through;':''}${status==='active'?'font-weight:700;':''}">${title}</div>
        ${sub?`<div class="ts" style="color:${s.sub}">${sub}</div>`:''}</div></div>`;
  };

  return `
  <div class="block">
    <div class="label">${s.num} <b>${s.name}</b>${s.badge}</div>
    <div class="why">${s.why}</div>
    <div class="scene" style="background:${s.sceneBg};${s.sceneExtra||''}">
      <div class="tri">

        <!-- SETUP -->
        <div>
          <div class="col-lbl" style="color:${s.colLbl}">Agenda Creator</div>
          <div class="p sc" style="background:${s.panelBg};border:${s.panelBorder};${s.font||''}">
            <div class="sh" style="background:${s.headerBg};border-bottom:${s.headerLine}">
              <div class="slogo"><div class="sico" style="background:${s.logoBg};color:${s.logoC}">${sun}</div>
              <span style="color:${s.logoTxt}">CivicPulse</span></div>
              <div class="stitle" style="color:${s.heading}">${s.titleText||'New Meeting Session'}</div>
              <div class="sdesc" style="color:${s.desc}">Start a real-time council meeting session. Choose a source, attach an agenda, and begin.</div>
            </div>
            <div class="sbody">
              <div class="slbl" style="color:${s.lbl}">Attach Agenda</div>
              <div class="apk" style="background:${s.pickSelBg};border:1.5px solid ${s.pickSelBdr}">
                <div class="apki" style="background:${s.pickSelIcon};color:${s.pickSelIconC}">${chk}</div>
                <div><div class="apkt" style="color:${s.pickSelTxt}">Regular Council — Apr 2</div>
                <div class="apkm" style="color:${s.pickMeta}">13 items</div></div>
              </div>
              <div class="apk" style="background:${s.pickBg};border:1.5px solid ${s.pickBdr}">
                <div class="apki" style="background:${s.pickIcon};color:${s.pickIconC}">${doc}</div>
                <div><div class="apkt" style="color:${s.pickTxt}">Special Meeting — Budget</div>
                <div class="apkm" style="color:${s.pickMeta}">6 items</div></div>
              </div>
              <div class="sdiv" style="background:${s.divider}"></div>
              <button class="btn" style="background:${s.btnPrimBg};color:${s.btnPrimC};${s.btnShadow||''}">${play} Start Meeting</button>
              <div class="btnr">
                <button class="btn" style="background:${s.btnSecBg};border:1.5px solid ${s.btnSecBdr};color:${s.btnSecC}">Live Test</button>
                <button class="btn" style="background:${s.btnSecBg};border:1.5px solid ${s.btnSecBdr};color:${s.btnSecC}">Demo</button>
              </div>
            </div>
          </div>
        </div>

        <!-- LIVE AGENDA -->
        <div>
          <div class="col-lbl" style="color:${s.colLbl}">Live Agenda</div>
          <div class="p" style="background:${s.panelBg};border:${s.panelBorder};${s.font||''}">
            <div class="ph" style="border-bottom:${s.headerLine}"><h3 style="color:${s.heading}">Agenda</h3><span class="cnt" style="color:${s.sub}"><b style="color:${s.heading}">5</b> / 13</span></div>
            <div class="bar" style="background:${s.barBg}"><div class="bar-fill" style="background:${s.barFill}"></div></div>
            ${mkRow(1,'done','Call to Order')}
            ${mkRow(2,'done','Adoption of Agenda')}
            ${mkRow(3,'done','Adoption of Minutes')}
            ${mkRow(4,'done','Delegations')}
            ${mkRow(5,'done','Public Hearing — Bylaw 1021')}
            ${mkRow(6,'active','CAO Report','Monthly operations update')}
            ${mkRow(7,'','Financial Report — Q1')}
            ${mkRow(8,'','New Business','3 motions')}
            ${mkRow(9,'','Correspondence')}
            ${mkRow(10,'','In-Camera')}
            ${mkRow(11,'','Adjournment')}
          </div>
        </div>

        <!-- RULES -->
        <div>
          <div class="col-lbl" style="color:${s.colLbl}">Rules Panel</div>
          <div class="p" style="background:${s.panelBg};border:${s.panelBorder};${s.font||''}">
            <div class="trow"><div class="tg" style="background:${s.tabBg}">
              <div class="t" style="background:${s.tabActiveBg};color:${s.tabActiveC};${s.tabShadow||''}">Robert's Rules</div>
              <div class="t" style="color:${s.tabC}">Procedure</div>
              <div class="t" style="color:${s.tabC}">Precedent</div>
            </div></div>
            <div class="bd">
              <div class="cb" style="background:${s.catBg}"><span style="color:${s.catC}">Main Motions</span><span class="cc" style="color:${s.catCount}">2</span></div>
              <div class="cps"><span class="cp" style="background:${s.chipActBg};border:1.5px solid ${s.chipActBdr};color:${s.chipActC}">Main Motion</span><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Adopt/Approve</span></div>
              <div class="cb" style="background:${s.catBg}"><span style="color:${s.catC}">Amending Motions</span><span class="cc" style="color:${s.catCount}">2</span></div>
              <div class="cps"><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Amend</span><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Amend the Amendment</span></div>
              <div class="cb" style="background:${s.catBg}"><span style="color:${s.catC}">Postpone & Defer</span><span class="cc" style="color:${s.catCount}">3</span></div>
              <div class="cps"><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Postpone</span><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Table</span><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Take from Table</span></div>
              <div class="cb" style="background:${s.catBg}"><span style="color:${s.catC}">Voting & Procedure</span><span class="cc" style="color:${s.catCount}">2</span></div>
              <div class="cps"><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Call the Question</span><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Point of Order</span></div>
              <div class="cb" style="background:${s.catBg}"><span style="color:${s.catC}">Readings & Bylaws</span><span class="cc" style="color:${s.catCount}">2</span></div>
              <div class="cps"><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">First Reading</span><span class="cp" style="background:${s.chipBg};border:1.5px solid ${s.chipBdr};color:${s.chipC}">Third Reading</span></div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>`;
}

// =====================================================
// 15 DESIGNS
// =====================================================

// 1 — Slate Professional (current token system, elevated)
W(panel({
  num:'#1', name:'Slate Professional', badge:'<span class="rec top">TOP PICK</span>',
  why:'Your current color system done right. Slate is the industry standard for gov-tech — trustworthy, neutral, high contrast. This is the safe bet that looks expensive.',
  sceneBg:'#f1f5f9', colLbl:'#94a3b8',
  panelBg:'#fff', panelBorder:'1px solid #e2e8f0',
  headerBg:'linear-gradient(135deg,#f8fafc,#f1f5f9)', headerLine:'1px solid #e2e8f0',
  logoBg:'linear-gradient(135deg,#475569,#64748b)', logoC:'#fff', logoTxt:'#475569',
  heading:'#0f172a', desc:'#64748b', lbl:'#94a3b8', sub:'#94a3b8', divider:'#f1f5f9',
  pickSelBg:'#f1f5f9', pickSelBdr:'#475569', pickSelIcon:'#475569', pickSelIconC:'#fff', pickSelTxt:'#475569',
  pickBg:'#fff', pickBdr:'#e2e8f0', pickIcon:'#f1f5f9', pickIconC:'#94a3b8', pickTxt:'#334155', pickMeta:'#94a3b8',
  btnPrimBg:'linear-gradient(135deg,#475569,#64748b)', btnPrimC:'#fff', btnShadow:'box-shadow:0 2px 10px rgba(71,85,105,.2)',
  btnSecBg:'#f8fafc', btnSecBdr:'#e2e8f0', btnSecC:'#64748b',
  barBg:'#e2e8f0', barFill:'#475569',
  mkDone:'#cbd5e1', mkActive:'#0f172a', mkActiveBg:'#0f172a', mkActiveC:'#fff', mkPend:'#e2e8f0',
  ttDone:'#cbd5e1', ttActive:'#0f172a', ttPend:'#475569', activeBg:'#f8fafc',
  tabBg:'#f1f5f9', tabActiveBg:'#fff', tabActiveC:'#334155', tabC:'#94a3b8', tabShadow:'box-shadow:0 1px 2px rgba(0,0,0,.06)',
  catBg:'#f8fafc', catC:'#334155', catCount:'#94a3b8',
  chipActBg:'#f1f5f9', chipActBdr:'#475569', chipActC:'#0f172a',
  chipBg:'#fff', chipBdr:'#e2e8f0', chipC:'#475569',
}));

// 2 — Indigo Civic
W(panel({
  num:'#2', name:'Indigo Civic', badge:'<span class="rec top">TOP PICK</span>',
  why:'Indigo reads as "official" — think government seals, university crests. Warmer than slate, more personality, still fully professional. Great differentiation from generic SaaS.',
  sceneBg:'#eef2ff', colLbl:'#818cf8',
  panelBg:'#fff', panelBorder:'1px solid #e0e7ff',
  headerBg:'linear-gradient(135deg,#eef2ff,#e0e7ff)', headerLine:'1px solid #e0e7ff',
  logoBg:'linear-gradient(135deg,#4f46e5,#6366f1)', logoC:'#fff', logoTxt:'#4f46e5',
  heading:'#1e1b4b', desc:'#6366f1', lbl:'#a5b4fc', sub:'#a5b4fc', divider:'#eef2ff',
  pickSelBg:'#eef2ff', pickSelBdr:'#4f46e5', pickSelIcon:'#4f46e5', pickSelIconC:'#fff', pickSelTxt:'#4f46e5',
  pickBg:'#fff', pickBdr:'#e0e7ff', pickIcon:'#eef2ff', pickIconC:'#a5b4fc', pickTxt:'#312e81', pickMeta:'#a5b4fc',
  btnPrimBg:'linear-gradient(135deg,#4f46e5,#6366f1)', btnPrimC:'#fff', btnShadow:'box-shadow:0 2px 10px rgba(79,70,229,.25)',
  btnSecBg:'#fafafe', btnSecBdr:'#e0e7ff', btnSecC:'#6366f1',
  barBg:'#e0e7ff', barFill:'#4f46e5',
  mkDone:'#c7d2fe', mkActive:'#4f46e5', mkActiveBg:'#4f46e5', mkActiveC:'#fff', mkPend:'#e0e7ff',
  ttDone:'#c7d2fe', ttActive:'#1e1b4b', ttPend:'#4338ca', activeBg:'#eef2ff',
  tabBg:'#eef2ff', tabActiveBg:'#fff', tabActiveC:'#312e81', tabC:'#a5b4fc', tabShadow:'box-shadow:0 1px 2px rgba(79,70,229,.08)',
  catBg:'#f5f3ff', catC:'#312e81', catCount:'#a5b4fc',
  chipActBg:'#eef2ff', chipActBdr:'#4f46e5', chipActC:'#312e81',
  chipBg:'#fff', chipBdr:'#e0e7ff', chipC:'#4338ca',
}));

// 3 — Navy Command
W(panel({
  num:'#3', name:'Navy Command', badge:'<span class="rec strong">STRONG</span>',
  why:'Dark navy is authoritative without being gloomy. Think Bloomberg terminal meets city hall. Excellent for low-light council chambers and evening sessions.',
  sceneBg:'#0f172a', colLbl:'#475569',
  panelBg:'#1e293b', panelBorder:'1px solid #334155',
  headerBg:'#1a2332', headerLine:'1px solid #334155',
  logoBg:'#3b82f6', logoC:'#fff', logoTxt:'#60a5fa',
  heading:'#f1f5f9', desc:'#64748b', lbl:'#475569', sub:'#475569', divider:'#334155',
  pickSelBg:'#1e3a5f', pickSelBdr:'#3b82f6', pickSelIcon:'#3b82f6', pickSelIconC:'#fff', pickSelTxt:'#93c5fd',
  pickBg:'#1e293b', pickBdr:'#334155', pickIcon:'#334155', pickIconC:'#64748b', pickTxt:'#cbd5e1', pickMeta:'#475569',
  btnPrimBg:'#3b82f6', btnPrimC:'#fff', btnShadow:'box-shadow:0 2px 10px rgba(59,130,246,.3)',
  btnSecBg:'#1e293b', btnSecBdr:'#334155', btnSecC:'#94a3b8',
  barBg:'#334155', barFill:'#3b82f6',
  mkDone:'#334155', mkActive:'#3b82f6', mkActiveBg:'#3b82f6', mkActiveC:'#fff', mkPend:'#475569',
  ttDone:'#475569', ttActive:'#f1f5f9', ttPend:'#94a3b8', activeBg:'rgba(59,130,246,.06)',
  tabBg:'#0f172a', tabActiveBg:'#1e293b', tabActiveC:'#e2e8f0', tabC:'#475569',
  catBg:'rgba(59,130,246,.06)', catC:'#93c5fd', catCount:'#475569',
  chipActBg:'rgba(59,130,246,.12)', chipActBdr:'#3b82f6', chipActC:'#93c5fd',
  chipBg:'#1e293b', chipBdr:'#334155', chipC:'#94a3b8',
}));

// 4 — Arctic Frost Glass
W(panel({
  num:'#4', name:'Arctic Frost Glass', badge:'<span class="rec top">TOP PICK</span>',
  why:'Light glassmorphism that actually works — the frosted panels give depth without sacrificing readability. Feels modern and premium. This is the "wow" pick that still functions.',
  sceneBg:'linear-gradient(135deg,#c3d5e8,#d5dff0,#e0eafc)', colLbl:'rgba(71,85,105,.4)',
  sceneExtra:'box-shadow:inset 0 0 60px rgba(255,255,255,.3)',
  panelBg:'rgba(255,255,255,.6)', panelBorder:'1px solid rgba(255,255,255,.75)',
  headerBg:'rgba(255,255,255,.35)', headerLine:'1px solid rgba(0,0,0,.05)',
  logoBg:'linear-gradient(135deg,#475569,#64748b)', logoC:'#fff', logoTxt:'#475569',
  heading:'#1e293b', desc:'#64748b', lbl:'#94a3b8', sub:'#94a3b8', divider:'rgba(0,0,0,.06)',
  pickSelBg:'rgba(71,85,105,.06)', pickSelBdr:'#475569', pickSelIcon:'#475569', pickSelIconC:'#fff', pickSelTxt:'#334155',
  pickBg:'rgba(255,255,255,.4)', pickBdr:'rgba(0,0,0,.08)', pickIcon:'rgba(0,0,0,.04)', pickIconC:'#94a3b8', pickTxt:'#334155', pickMeta:'#94a3b8',
  btnPrimBg:'linear-gradient(135deg,#475569,#64748b)', btnPrimC:'#fff', btnShadow:'box-shadow:0 3px 12px rgba(71,85,105,.2)',
  btnSecBg:'rgba(255,255,255,.5)', btnSecBdr:'rgba(0,0,0,.1)', btnSecC:'#64748b',
  barBg:'rgba(0,0,0,.06)', barFill:'#475569',
  mkDone:'#cbd5e1', mkActive:'#0f172a', mkActiveBg:'#0f172a', mkActiveC:'#fff', mkPend:'#d4d4d8',
  ttDone:'#cbd5e1', ttActive:'#0f172a', ttPend:'#475569', activeBg:'rgba(71,85,105,.04)',
  tabBg:'rgba(0,0,0,.04)', tabActiveBg:'rgba(255,255,255,.6)', tabActiveC:'#334155', tabC:'#94a3b8', tabShadow:'box-shadow:0 1px 3px rgba(0,0,0,.06)',
  catBg:'rgba(0,0,0,.03)', catC:'#334155', catCount:'#94a3b8',
  chipActBg:'rgba(71,85,105,.08)', chipActBdr:'#475569', chipActC:'#1e293b',
  chipBg:'rgba(255,255,255,.5)', chipBdr:'rgba(0,0,0,.08)', chipC:'#475569',
}));

// 5 — Warm Parchment
W(panel({
  num:'#5', name:'Warm Parchment', badge:'<span class="rec strong">STRONG</span>',
  why:'Paper-like warmth says "official document" — think bylaws, council minutes, formal records. Pairs beautifully with the civic content. Comfortable for long reading sessions.',
