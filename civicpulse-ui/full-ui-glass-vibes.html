  .col-label {
    font-size: 7px; font-weight: 700; letter-spacing: 1.8px; text-transform: uppercase;

  /* === Shared glass panel === */
  .panel {
    backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
    border-radius: 14px; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .panel-head {
    padding: 12px 16px 10px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .panel-head h3 {
    font-size: 10px; font-weight: 800; letter-spacing: 1.8px; text-transform: uppercase;
  }
  .counter { font-size: 9px; font-weight: 600; }
  .counter b { font-weight: 800; }
  .progress { height: 3px; margin: 0 16px; border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; width: 38%; border-radius: 2px; }

  /* Agenda items */
  .item-row { display: flex; gap: 10px; padding: 7px 16px; align-items: flex-start; }
  .marker {
    width: 18px; height: 18px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 8px; font-weight: 800; flex-shrink: 0;
  }
  .item-title { font-size: 11px; font-weight: 600; line-height: 1.4; }
  .item-sub { font-size: 8px; margin-top: 1px; }

  /* Rules */
  .body { padding: 8px 12px; flex: 1; }
  .cat-bar {
    display: flex; align-items: center; gap: 6px; padding: 6px 10px;
    border-radius: 8px; margin-bottom: 5px;
  }
  .cat-bar span { font-size: 10px; font-weight: 700; }
  .cat-count { font-size: 8px; margin-left: auto; }
  .chips { padding: 4px 0 8px 10px; }
  .chip {
    display: inline-block; padding: 5px 11px; border-radius: 999px;
    font-size: 10px; font-weight: 600; margin: 2px;
  }
  .tab-row { display: flex; justify-content: center; padding: 8px 12px 0; }
  .tab-group { display: flex; border-radius: 8px; padding: 2px; }
  .tab {
    padding: 4px 9px; border: none; border-radius: 6px;
    font-size: 9px; font-weight: 600; cursor: pointer; background: transparent;
  }

  /* === Setup card === */
  .setup-card { display: flex; flex-direction: column; }
  .setup-header { padding: 18px 20px 14px; border-radius: 14px 14px 0 0; }
  .setup-logo {
    display: flex; align-items: center; gap: 6px; margin-bottom: 10px;
  }
  .setup-logo-icon {

    display: flex; align-items: center; justify-content: center;

  .setup-logo span { font-size: 9px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; }
  .setup-title { font-size: 18px; font-weight: 800; letter-spacing: -.3px; margin-bottom: 4px; }
  .setup-desc { font-size: 11px; line-height: 1.6; }
  .setup-body { padding: 16px 20px 18px; flex: 1; }
  .setup-label { font-size: 9px; font-weight: 700; letter-spacing: 1.3px; text-transform: uppercase; margin-bottom: 8px; }
  .setup-divider { height: 1px; margin: 12px 0; }

  /* Agenda picker items */
  .agenda-pick {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 14px; border-radius: 10px; margin-bottom: 6px;
    cursor: pointer; transition: all .15s;

  .agenda-pick-icon {

  .agenda-pick-meta { font-size: 10px; margin-top: 1px; }
