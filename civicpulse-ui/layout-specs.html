function renderCell(c) {
  if (c.stack) {
    return `<div style="display:flex;flex-direction:column;gap:6px;min-height:0;${c.style||''}">
      ${c.children.map(ch => `<div class="pnl" style="flex:${ch.flex||1};min-height:0;">
        <div class="ph ${ch.cls}"><div class="ic"></div><span class="tt">${ch.t}</span>${ch.b?`<span class="bd">${ch.b}</span>`:''}</div>
        <div class="bdy" style="${ch.col?'display:flex;flex-direction:column;':''}">${ch.html}</div>
      </div>`).join('')}
    </div>`;
  }
  return `<div class="pnl" style="${c.style||''}">
    <div class="ph ${c.cls}"><div class="ic"></div><span class="tt">${c.t}</span>${c.b?`<span class="bd">${c.b}</span>`:''}</div>
    <div class="bdy" style="${c.scroll?'overflow-y:auto;':''}${c.pad?'padding:4px 6px;':''}${c.col?'display:flex;flex-direction:column;':''}">${c.html}</div>
  </div>`;
}

document.querySelector('.specs').innerHTML = layouts.map(l =>
  `<div class="sw" onclick="select(this,'${l.id}')">
    <div class="sh"><span class="tag">${l.num}</span><h2>${l.name}</h2><p>${l.desc}</p></div>
    <div class="mk"><div class="mg" style="${l.grid}">${l.cells.map(renderCell).join('')}</div></div>
  </div>`
).join('');
</script>

</div>

<div id="result">
  <div class="label">YOUR SELECTION</div>
  <div class="pick" id="pick-text"></div>
</div>

<script>
const layoutNames = {l1:'01 — Current',l2:'02 — Classic 2×2',l3:'03 — Command Center',l4:'04 — Agenda Banner',l5:'05 — Top Heavy',l6:'06 — L-Shape',l7:'07 — Sidebar Agenda',l8:'08 — Triple Column',l9:'09 — Topics Banner',l10:'10 — PB Stage'};
function select(el, id) {
  document.querySelectorAll('.sw').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('result').style.display = 'block';
  document.getElementById('pick-text').textContent = layoutNames[id];
}
</script>
